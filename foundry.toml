[profile.default]
src = "contracts/joe-v2/src"
test = "contracts/joe-v2/test"
script = "contracts/joe-v2/script"
out = "out"
libs = ["contracts/joe-v2/lib"]
solc_version = "0.8.20"
evm_version = "paris"
optimizer = true
optimizer_runs = 800
fs_permissions = [
  { access = "read", path = "./" },
  { access = "read-write", path = "./deployments" },
]
allow_internal_expect_revert = true

[fuzz]
runs = 1024

[rpc_endpoints]
avalanche = "${AVALANCHE_RPC_URL}"
fuji = "${FUJI_RPC_URL}"
robinhood = "${ROBINHOOD_RPC_URL}"
robinhood_testnet = "${ROBINHOOD_TESTNET_RPC_URL}"
local = "http://127.0.0.1:8545"

# Blockscout-style verification is expected for Robinhood Chain.
# Verifier URLs:
# - Mainnet: https://robinhoodchain.blockscout.com/api/
# - Testnet: https://explorer.testnet.chain.robinhood.com/api/
