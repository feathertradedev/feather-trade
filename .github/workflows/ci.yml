name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  token-lists:
    name: Token Lists
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate token lists
        run: pnpm tokens:validate

      - name: Validate deployment manifests
        run: pnpm manifests:validate

      - name: Test Wave 4 matrix validator
        run: pnpm wave4:test

      - name: Validate Wave 4 matrix foundation
        run: pnpm wave4:validate

      - name: Test Robinhood RPC readiness helper
        run: pnpm robinhood:rpc:test

      - name: Test remove-liquidity rehearsal batching
        run: pnpm robinhood:remove-liquidity:test

      - name: Test Robinhood ownership handoff helper
        run: pnpm robinhood:ownership:test

      - name: Test Robinhood verification helper
        run: pnpm robinhood:verify:test

      - name: Test Robinhood deploy wrapper
        run: pnpm robinhood:deploy:test

      - name: Test launch health helper
        run: pnpm launch:health:test

      - name: Test hosted release helper
        run: pnpm web:test:hosted-release

      - name: Test observability output redaction
        run: pnpm observability:redaction:test

      - name: Test protected web promotion workflow
        run: pnpm release:web-promotion:test

      - name: Test VPS deployment validator
        run: pnpm vps:test

      - name: Validate operator runbooks
        run: pnpm release:runbooks:validate

      - name: Test operator runbook validator
        run: pnpm release:runbooks:test

      - name: Test public wallet runtime validation
        run: pnpm web:test:public-runtime

      - name: Test public artifact security policy
        run: pnpm web:test:public-artifact

      - name: Validate VPS deployment topology
        run: pnpm vps:validate

      - name: Parse the pinned Caddy configuration
        run: |
          docker run --rm \
            --env FEATHER_APP_DOMAIN=app.example.invalid \
            --env FEATHER_DOCS_DOMAIN=docs.example.invalid \
            --env "FEATHER_APP_CONNECT_SRC='self' https://rpc.example.invalid" \
            --volume "$PWD/infra/vps/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d \
            caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

      - name: Resolve the VPS Compose topology
        env:
          FEATHER_ANALYTICS_ADAPTERS_DIR: ${{ github.workspace }}/infra/vps
          FEATHER_ANALYTICS_CONFIG_DIR: ${{ github.workspace }}/infra/vps
          FEATHER_ANALYTICS_ENV_FILE: ${{ github.workspace }}/infra/vps/analytics.env.example
          FEATHER_ANALYTICS_IMAGE_DIGEST: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          FEATHER_ANALYTICS_IMAGE_REPOSITORY: ghcr.io/feathertradedev/feather-analytics
          FEATHER_APP_CONNECT_SRC: "'self' https://rpc.example.invalid"
          FEATHER_APP_DOMAIN: app.example.invalid
          FEATHER_DOCS_DOMAIN: docs.example.invalid
          FEATHER_RELEASES_DIR: ${{ github.workspace }}
        run: docker compose --file infra/vps/compose.yml config --quiet

      - name: Validate token asset references
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const tokenListRoot = "packages/sdk/src/token-lists";
          const publicRoot = "apps/web/public";

          for (const file of fs.readdirSync(tokenListRoot).filter((name) => name.endsWith(".json") && name !== "schema.json")) {
            const json = JSON.parse(fs.readFileSync(path.join(tokenListRoot, file), "utf8"));

            for (const token of json.tokens ?? []) {
              const logo = path.join(publicRoot, token.logoURI.replace(/^\/+/, ""));

              if (!fs.existsSync(logo)) {
                throw new Error(`${file}: missing ${logo}`);
              }

              const svg = fs.readFileSync(logo, "utf8");

              if (!svg.includes("<svg") || /<script/i.test(svg)) {
                throw new Error(`${logo}: invalid svg placeholder`);
              }
            }
          }
          NODE

  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1.9.0
        with:
          version: v1.4.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Forge build
        run: pnpm contracts:build

      - name: Forge core tests
        run: pnpm contracts:test:core

  packages:
    name: SDK, Analytics, and Web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      analytics-postgres:
        image: postgres:16.13-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
        env:
          POSTGRES_DB: analytics
          POSTGRES_PASSWORD: analytics
          POSTGRES_USER: analytics
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U analytics -d analytics"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @robinhood-lb/web exec playwright install --with-deps chromium

      - name: Typecheck SDK
        run: pnpm sdk:typecheck

      - name: Build SDK
        run: pnpm sdk:build

      - name: Test SDK
        run: pnpm sdk:test

      - name: Typecheck analytics
        run: pnpm analytics:typecheck

      - name: Build analytics
        run: pnpm analytics:build

      - name: Test analytics
        env:
          ANALYTICS_TEST_DATABASE_URL: postgres://analytics:analytics@127.0.0.1:5432/analytics
        run: pnpm analytics:test

      - name: Build production analytics image
        run: docker build --file packages/analytics/Dockerfile --tag feather-analytics-ci:${{ github.sha }} .

      - name: Typecheck web app
        run: pnpm web:typecheck

      - name: Test web GraphQL pagination
        run: pnpm web:test:pagination

      - name: Test web pool discovery
        run: pnpm web:test:pool-discovery

      - name: Test web pool selection
        run: pnpm web:test:pool-selection

      - name: Test web position burn planning
        run: pnpm web:test:positions

      - name: Test web transaction safety
        run: pnpm web:test:safety

      - name: Test web wallet-state E2E
        run: pnpm web:test:e2e

      - name: Upload Playwright wallet-state artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-wallet-state-e2e
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Build web app
        run: pnpm web:build

      - name: Test web public config fixtures
        run: pnpm web:test:public-config

      - name: Build and check synthetic public testnet web artifact
        env:
          AVALANCHE_RPC_URL: public-canary-avalanche-rpc
          DEPLOYER_PRIVATE_KEY: public-canary-deployer-key
          GOLDSKY_API_KEY: public-canary-goldsky-key
          INDEXER_ROBINHOOD_ENDPOINT: public-canary-indexer-endpoint
          ROBINHOOD_ARCHIVE_RPC_URL: public-canary-robinhood-archive-rpc
          ROBINHOOD_DEPLOYER_PRIVATE_KEY: public-canary-robinhood-deployer-key
          ROBINHOOD_FALLBACK_RPC_URL: public-canary-robinhood-fallback-rpc
          ROBINHOOD_MAINNET_ARCHIVE_RPC_URL: public-canary-robinhood-mainnet-archive-rpc
          ROBINHOOD_MAINNET_FALLBACK_RPC_URL: public-canary-robinhood-mainnet-fallback-rpc
          ROBINHOOD_RPC_URL: public-canary-robinhood-mainnet-rpc
          ROBINHOOD_SUBGRAPH_URL: public-canary-robinhood-subgraph
          ROBINHOOD_TESTNET_ARCHIVE_RPC_URL: public-canary-robinhood-testnet-archive-rpc
          ROBINHOOD_TESTNET_FALLBACK_RPC_URL: public-canary-robinhood-testnet-fallback-rpc
          ROBINHOOD_TESTNET_RPC_URL: public-canary-robinhood-testnet-rpc
          VITE_REOWN_PROJECT_ID: public_wallet_project_0123456789
        run: |
          mkdir -p .local/public-web
          pnpm web:fixture:public -- --environment robinhoodTestnet --out .local/public-web/robinhood-testnet.latest.json
          VITE_ROBINHOOD_TESTNET_MANIFEST_PATH=.local/public-web/robinhood-testnet.latest.json pnpm web:build:public:testnet
          pnpm web:check:public-artifact -- --environment robinhoodTestnet --manifest .local/public-web/robinhood-testnet.latest.json --dist apps/web/dist

      - name: Build and check synthetic public mainnet web artifact
        env:
          AVALANCHE_RPC_URL: public-canary-avalanche-rpc
          DEPLOYER_PRIVATE_KEY: public-canary-deployer-key
          GOLDSKY_API_KEY: public-canary-goldsky-key
          INDEXER_ROBINHOOD_ENDPOINT: public-canary-indexer-endpoint
          ROBINHOOD_ARCHIVE_RPC_URL: public-canary-robinhood-archive-rpc
          ROBINHOOD_DEPLOYER_PRIVATE_KEY: public-canary-robinhood-deployer-key
          ROBINHOOD_FALLBACK_RPC_URL: public-canary-robinhood-fallback-rpc
          ROBINHOOD_MAINNET_ARCHIVE_RPC_URL: public-canary-robinhood-mainnet-archive-rpc
          ROBINHOOD_MAINNET_FALLBACK_RPC_URL: public-canary-robinhood-mainnet-fallback-rpc
          ROBINHOOD_RPC_URL: public-canary-robinhood-mainnet-rpc
          ROBINHOOD_SUBGRAPH_URL: public-canary-robinhood-subgraph
          ROBINHOOD_TESTNET_ARCHIVE_RPC_URL: public-canary-robinhood-testnet-archive-rpc
          ROBINHOOD_TESTNET_FALLBACK_RPC_URL: public-canary-robinhood-testnet-fallback-rpc
          ROBINHOOD_TESTNET_RPC_URL: public-canary-robinhood-testnet-rpc
          VITE_REOWN_PROJECT_ID: public_wallet_project_0123456789
        run: |
          mkdir -p .local/public-web
          pnpm web:fixture:public -- --environment robinhood --out .local/public-web/robinhood-mainnet.latest.json
          VITE_ROBINHOOD_MANIFEST_PATH=.local/public-web/robinhood-mainnet.latest.json pnpm web:build:public:mainnet
          pnpm web:check:public-artifact -- --environment robinhood --manifest .local/public-web/robinhood-mainnet.latest.json --dist apps/web/dist

  localnet-e2e:
    name: Localnet E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1.9.0
        with:
          version: v1.4.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run deterministic localnet transactions
        run: pnpm e2e:localnet

      - name: Upload localnet E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: localnet-e2e-logs
          path: .local/e2e/
          if-no-files-found: ignore
          retention-days: 7

  browser-localnet-e2e:
    name: Browser Localnet E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1.9.0
        with:
          version: v1.4.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @robinhood-lb/web exec playwright install --with-deps chromium

      - name: Run browser-to-localnet E2E
        timeout-minutes: 15
        run: pnpm web:test:e2e:localnet

      - name: Upload browser-to-localnet diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-localnet-e2e-diagnostics
          path: .local/browser-e2e/
          if-no-files-found: ignore
          retention-days: 7

  indexer:
    name: Indexer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build subgraph
        run: pnpm indexer:build

      - name: Build Robinhood testnet subgraph
        run: pnpm indexer:build:robinhood:testnet

      - name: Build Robinhood mainnet subgraph
        run: pnpm indexer:build:robinhood:mainnet

      - name: Test Robinhood smoke path
        run: pnpm indexer:test:smoke:robinhood

      - name: Test Goldsky deployment wrapper
        run: pnpm indexer:test:goldsky:robinhood

      - name: Test Pair fee aggregates
        run: pnpm indexer:test:pair-fees

      - name: Test Graph Node mapping assertions
        run: pnpm indexer:test:graph-node-assertions

  graph-node-e2e:
    name: Graph Node Mapping E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1.9.0
        with:
          version: v1.4.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Execute mappings against Graph Node
        timeout-minutes: 20
        env:
          LOCALNET_ANVIL_HOST: 0.0.0.0
        run: pnpm indexer:e2e:graph-node

      - name: Upload Graph Node E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: graph-node-e2e-diagnostics
          path: |
            .local/graph-node-e2e/
            .local/anvil.log
            .local/subgraph-smoke*.json
            .local/subgraph-smoke*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Fallback cleanup
        if: always()
        run: |
          docker compose -f indexer/subgraph/docker-compose.yml down --volumes --remove-orphans || true
          pnpm localnet:down || true

  solidity-static-analysis:
    name: Solidity Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1.9.0
        with:
          version: v1.4.1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Slither
        run: python -m pip install slither-analyzer==0.11.5

      - name: Run Slither advisory scan
        id: slither
        working-directory: contracts/joe-v2
        run: |
          set +e
          slither . --config-file slither.config.json 2>&1 | tee slither-report.txt
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::warning title=Slither advisory findings::Slither exited with status $status. Review the job log or slither-report artifact; this Wave 1 advisory job is non-blocking."
          fi
          exit 0

      - name: Upload Slither advisory report
        uses: actions/upload-artifact@v7
        with:
          name: slither-advisory-report
          path: contracts/joe-v2/slither-report.txt
          if-no-files-found: ignore
