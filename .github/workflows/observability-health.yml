name: Observability Health

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Use offline for a no-secret check or live for strict endpoint health"
        required: true
        default: offline
        type: choice
        options:
          - offline
          - live
      manifest:
        description: "Repository-relative deployment manifest"
        required: true
        default: deployments/examples/robinhood-testnet.example.json
        type: string

permissions:
  contents: read

concurrency:
  group: observability-health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-health:
    name: Offline starter health
    if: github.event_name != 'workflow_dispatch' || inputs.mode == 'offline'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HEALTH_MANIFEST: ${{ inputs.manifest || 'deployments/examples/robinhood-testnet.example.json' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Run offline health check
        shell: bash
        run: pnpm --silent launch:health -- "$HEALTH_MANIFEST" --offline --json

  live-health:
    name: Strict live health
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'live'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: observability-health
    env:
      HEALTH_MANIFEST: ${{ inputs.manifest }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Run live health check with redacted output
        shell: bash
        env:
          LAUNCH_HEALTH_RPC_URL: ${{ secrets.OBSERVABILITY_RPC_URL }}
          LAUNCH_HEALTH_GRAPHQL_URL: ${{ secrets.OBSERVABILITY_GRAPHQL_URL }}
          ROBINHOOD_PRODUCTION_OWNER: ${{ secrets.OBSERVABILITY_EXPECTED_OWNER }}
          ROBINHOOD_FEE_RECIPIENT: ${{ secrets.OBSERVABILITY_EXPECTED_FEE_RECIPIENT }}
          OBSERVABILITY_REDACT_RPC_URL: ${{ secrets.OBSERVABILITY_RPC_URL }}
          OBSERVABILITY_REDACT_GRAPHQL_URL: ${{ secrets.OBSERVABILITY_GRAPHQL_URL }}
          OBSERVABILITY_REDACT_OWNER: ${{ secrets.OBSERVABILITY_EXPECTED_OWNER }}
          OBSERVABILITY_REDACT_FEE_RECIPIENT: ${{ secrets.OBSERVABILITY_EXPECTED_FEE_RECIPIENT }}
        run: |
          set -o pipefail
          required=(LAUNCH_HEALTH_RPC_URL LAUNCH_HEALTH_GRAPHQL_URL ROBINHOOD_PRODUCTION_OWNER ROBINHOOD_FEE_RECIPIENT)
          for name in "${required[@]}"; do
            [[ -n "${!name}" ]] || { echo "::error::Live mode requires the protected $name secret"; exit 1; }
          done
          mkdir -p .local/observability
          pnpm --silent launch:health -- "$HEALTH_MANIFEST" --strict-launch --json 2>&1 \
            | node scripts/web/redact-observability-output.cjs \
            | tee .local/observability/launch-health.json

      - name: Upload redacted health evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: observability-health-${{ github.run_id }}
          path: .local/observability/launch-health.json
          if-no-files-found: warn
          retention-days: 14
