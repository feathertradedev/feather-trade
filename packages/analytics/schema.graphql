scalar BigInt

enum AnalyticsStatus {
  READY
  PARTIAL
  UNAVAILABLE
}

enum CandleInterval {
  ONE_MINUTE
  FIVE_MINUTES
  FIFTEEN_MINUTES
  HOUR
  FOUR_HOURS
  DAY
  WEEK
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  partial: Boolean!
}

type PoolMetrics {
  pair: ID!
  tokenX: ID!
  tokenY: ID!
  tvlUsdE18: BigInt
  volume24hUsdE18: BigInt
  fees24hUsdE18: BigInt @deprecated(reason: "Total trader-paid swap fees; use totalSwapFees24hUsdE18")
  feeToTvlE18: BigInt @deprecated(reason: "Total trader-paid swap fee / TVL; use lpNetSwapFeeToTvlE18 for LP economics")
  totalSwapFees24hUsdE18: BigInt
  protocolSwapFees24hUsdE18: BigInt
  lpNetSwapFees24hUsdE18: BigInt
  lpNetSwapFeeToTvlE18: BigInt
  feeBreakdownComplete: Boolean!
  priceUsdE18: BigInt
  asOfBlock: BigInt!
  asOfTimestamp: Int!
  status: AnalyticsStatus!
  missingPriceTokens: [ID!]!
}

type PoolMetricsConnection {
  nodes: [PoolMetrics!]!
  pageInfo: PageInfo!
}

input PoolDiscoveryRequest {
  pair: ID!
  preferredQuoteToken: ID
}

type PoolDiscoveryHourlyClose {
  startTimestamp: Int!
  closeUsdE18: BigInt!
  quoteToken: ID!
  finalized: Boolean!
  revision: Int!
  priceSource: String!
  firstBlockHash: String!
  lastBlockHash: String!
}

type PoolDiscoveryMarketMetadata {
  marketCapUsdE18: BigInt
  source: String!
  fetchedAt: Int!
  logoPath: String
  logoSource: String
}

type PoolDiscoveryPool {
  pair: ID!
  chainId: Int
  tokenX: ID!
  tokenY: ID!
  displayBaseToken: ID!
  displayQuoteToken: ID!
  poolPriceQuotePerBaseE18: BigInt
  hourlyCloses: [PoolDiscoveryHourlyClose!]!
  priceChange24hE18: BigInt
  tvlUsdE18: BigInt
  lpNetSwapFees24hUsdE18: BigInt
  volume24hUsdE18: BigInt
  status: AnalyticsStatus!
  missingPriceTokens: [ID!]!
  asOfBlock: BigInt!
  asOfBlockHash: String!
  asOfTimestamp: Int!
  marketMetadata: PoolDiscoveryMarketMetadata
}

type Candle {
  pair: ID!
  interval: CandleInterval!
  startTimestamp: Int!
  endTimestamp: Int!
  openUsdE18: BigInt
  highUsdE18: BigInt
  lowUsdE18: BigInt
  closeUsdE18: BigInt
  volumeUsdE18: BigInt
  feesUsdE18: BigInt @deprecated(reason: "Total trader-paid swap fees; use totalSwapFeesUsdE18")
  totalSwapFeesUsdE18: BigInt
  protocolSwapFeesUsdE18: BigInt
  lpNetSwapFeesUsdE18: BigInt
  feeBreakdownComplete: Boolean!
  tvlUsdE18: BigInt
  swapCount: Int!
  status: AnalyticsStatus!
  missingPriceTokens: [ID!]!
  firstBlock: BigInt!
  lastBlock: BigInt!
  firstBlockHash: String!
  lastBlockHash: String!
  finalized: Boolean!
  revision: Int!
  priceSource: String!
  quoteToken: ID!
}

type CandleConnection {
  nodes: [Candle!]!
  pageInfo: PageInfo!
  streamCursor: String!
}

type PoolStaticFeeParameters {
  baseFactor: BigInt!
  filterPeriod: BigInt!
  decayPeriod: BigInt!
  reductionFactor: BigInt!
  variableFeeControl: BigInt!
  protocolShare: BigInt!
  maxVolatilityAccumulator: BigInt!
}

type PoolVariableFeeParameters {
  volatilityAccumulator: BigInt!
  volatilityReference: BigInt!
  idReference: BigInt!
  timeOfLastUpdate: BigInt!
}

type PoolFeeState {
  static: PoolStaticFeeParameters!
  variable: PoolVariableFeeParameters!
}

type PoolState {
  chainId: Int!
  pair: ID!
  tokenX: ID!
  tokenY: ID!
  decimalsX: Int!
  decimalsY: Int!
  reserveX: BigInt!
  reserveY: BigInt!
  activeId: Int!
  binStep: Int!
  marketPriceQuoteE18: BigInt!
  priceUsdE18: BigInt
  tvlUsdE18: BigInt
  status: AnalyticsStatus!
  missingPriceTokens: [ID!]!
  feeState: PoolFeeState!
  asOfBlock: BigInt!
  asOfBlockHash: String!
  asOfTimestamp: Int!
  revision: Int!
}

type PoolBinState {
  chainId: Int!
  pair: ID!
  binId: BigInt!
  reserveX: BigInt!
  reserveY: BigInt!
  totalSupply: BigInt!
  updatedAtBlock: BigInt!
  updatedAtBlockHash: String!
  updatedAtTimestamp: Int!
  revision: Int!
}

type PoolStateSnapshot {
  state: PoolState!
  bins: [PoolBinState!]!
  streamCursor: String!
}

type PositionBinAccounting {
  binId: BigInt!
  liquidity: BigInt!
  costBasisUsdE18: BigInt
  currentValueUsdE18: BigInt
  realizedPnlUsdE18: BigInt
  unrealizedPnlUsdE18: BigInt
  amountX: BigInt
  amountY: BigInt
  asOfBlock: BigInt
  asOfTimestamp: Int
  status: AnalyticsStatus!
  missingPriceTokens: [ID!]!
}

type WalletPairPosition {
  owner: ID!
  pair: ID!
  bins: [PositionBinAccounting!]!
  costBasisUsdE18: BigInt
  currentValueUsdE18: BigInt
  realizedPnlUsdE18: BigInt
  unrealizedPnlUsdE18: BigInt
  status: AnalyticsStatus!
  missingPriceTokens: [ID!]!
  asOfBlock: BigInt
  asOfTimestamp: Int
}

type WalletPairPositionConnection {
  nodes: [WalletPairPosition!]!
  pageInfo: PageInfo!
}

type AnalyticsHealth {
  status: AnalyticsStatus!
  headBlock: BigInt
  headHash: String
  headTimestamp: Int
  canonicalBlockCount: Int!
  reorgCount: Int!
  partialEventCount: Int!
  missingPriceTokens: [ID!]!
  fresh: Boolean!
  headLagSeconds: Int
  maxHeadLagSeconds: Int!
  backfillStatus: String!
  backfillCursor: String
  backfillError: String
  coverageStartTimestamp: BigInt
  coverageThroughTimestamp: BigInt
  prices: [PriceHealth!]!
}

type PriceHealth {
  token: ID!
  source: String!
  feedId: String!
  status: String!
  observedAt: Int
  ageSeconds: Int
}

type Query {
  poolMetrics(first: Int!, after: String, asOfTimestamp: Int): PoolMetricsConnection!
  poolDiscovery(pools: [PoolDiscoveryRequest!]!, asOfTimestamp: Int): [PoolDiscoveryPool!]!
  poolState(pair: ID!, radius: Int!): PoolStateSnapshot
  pairCandles(pair: ID!, interval: CandleInterval!, fromTimestamp: Int!, toTimestamp: Int!, first: Int!, after: String): CandleConnection!
  walletPositions(owner: ID!, first: Int!, after: String): WalletPairPositionConnection!
  analyticsHealth: AnalyticsHealth!
}
