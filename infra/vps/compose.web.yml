name: feather-web-sepolia

x-logging: &bounded-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  caddy:
    image: caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    restart: unless-stopped
    init: true
    environment:
      FEATHER_APP_DOMAIN: ${FEATHER_APP_DOMAIN:?set FEATHER_APP_DOMAIN}
      FEATHER_DOCS_DOMAIN: ${FEATHER_DOCS_DOMAIN:?set FEATHER_DOCS_DOMAIN}
      FEATHER_APP_CONNECT_SRC: ${FEATHER_APP_CONNECT_SRC:?set FEATHER_APP_CONNECT_SRC}
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - type: bind
        source: ./Caddyfile.web
        target: /etc/caddy/Caddyfile
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${FEATHER_RELEASES_DIR:?set FEATHER_RELEASES_DIR}
        target: /srv/feather/releases
        read_only: true
        bind:
          create_host_path: false
      - type: volume
        source: caddy_data
        target: /data
      - type: volume
        source: caddy_config
        target: /config
    networks:
      - edge
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    cpus: "${FEATHER_CADDY_CPUS:-1.0}"
    mem_limit: ${FEATHER_CADDY_MEMORY_LIMIT:-512m}
    stop_grace_period: 30s
    logging: *bounded-logging

networks:
  edge: {}

volumes:
  caddy_data: {}
  caddy_config: {}
